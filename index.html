<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday, Gita 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white: #ffffff;
    --cloud: #f7f4f9;
    --pink-soft: #f9d6e3;
    --pink-mid: #f0a8c0;
    --pink-deep: #e07fa0;
    --blue-soft: #d6eaf8;
    --blue-mid: #a8cfe0;
    --blue-deep: #7ab3cc;
    --text: #6b5b6e;
    --text-light: #9e8ea0;
  }

  html, body { width: 100%; height: 100%; overflow: hidden; }

  /* ── PAGES ── */
  .page {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  .page.hidden { opacity: 0; pointer-events: none; transform: scale(1.04); }

  /* ── PAGE 1 BACKGROUND ── */
  #page1 {
    background: linear-gradient(160deg, #fdf6fb 0%, #eef6fd 50%, #fdf0f5 100%);
    flex-direction: column;
    gap: 0;
  }

  /* Sky canvas */
  #sky-canvas {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 0;
  }

  /* ── PETALS ── */
  .petal {
    position: absolute;
    width: 10px; height: 14px;
    border-radius: 60% 40% 60% 40% / 50% 50% 50% 50%;
    opacity: 0;
    animation: petalFall linear infinite;
    pointer-events: none;
    z-index: 1;
  }
  @keyframes petalFall {
    0%   { transform: translateY(-30px) rotate(0deg) translateX(0px); opacity: 0; }
    5%   { opacity: 0.8; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(110vh) rotate(720deg) translateX(60px); opacity: 0; }
  }

  /* ── SPARKLES ── */
  .sparkle {
    position: absolute;
    width: 6px; height: 6px;
    pointer-events: none;
    z-index: 2;
    animation: sparklePop ease-in-out infinite;
  }
  .sparkle::before, .sparkle::after {
    content: '';
    position: absolute;
    background: currentColor;
    border-radius: 9px;
  }
  .sparkle::before { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }
  .sparkle::after  { height: 100%; width: 2px; left: 50%; transform: translateX(-50%); }
  @keyframes sparklePop {
    0%, 100% { transform: scale(0) rotate(0deg);   opacity: 0; }
    40%       { transform: scale(1.4) rotate(45deg); opacity: 1; }
    70%       { transform: scale(0.8) rotate(90deg); opacity: 0.6; }
  }

  /* ── CONTENT LAYER ── */
  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px; text-align: center;
    padding: 20px;
  }

  /* tiny label above */
  .eyebrow {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 0.78rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--pink-deep);
    opacity: 0;
    animation: fadeUp 1.2s ease 0.3s forwards;
  }

  /* HAPPY BIRTHDAY */
  .hb-text {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(3.8rem, 11vw, 9rem);
    color: transparent;
    background: linear-gradient(135deg, #d48fa8 0%, #a8c8de 60%, #d48fa8 100%);
    -webkit-background-clip: text;
    background-clip: text;
    line-height: 1.1;
    opacity: 0;
    animation: fadeUp 1.2s ease 0.6s forwards;
    text-shadow: none;
    filter: drop-shadow(0 4px 24px rgba(212,143,168,0.18));
  }

  /* name */
  .name-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(1.1rem, 3vw, 1.8rem);
    color: var(--blue-deep);
    letter-spacing: 0.12em;
    opacity: 0;
    animation: fadeUp 1.2s ease 1s forwards;
  }

  /* divider */
  .divider {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--pink-mid), transparent);
    opacity: 0;
    animation: fadeUp 1.2s ease 1.3s forwards;
  }

  /* BUTTON */
  .btn-love {
    margin-top: 10px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    font-weight: 400;
    letter-spacing: 0.08em;
    color: #fff;
    background: linear-gradient(135deg, #e8a0bc 0%, #a8cfe0 100%);
    border: none;
    padding: 14px 46px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 6px 30px rgba(232,160,188,0.35), 0 2px 8px rgba(168,207,224,0.2);
    opacity: 0;
    animation: fadeUp 1.2s ease 1.6s forwards;
    transition: transform 0.22s ease, box-shadow 0.22s ease;
    position: relative;
    overflow: hidden;
  }
  .btn-love::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.22), transparent);
    border-radius: inherit;
  }
  .btn-love:hover {
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 12px 40px rgba(232,160,188,0.45), 0 4px 12px rgba(168,207,224,0.3);
  }
  .btn-love:active { transform: translateY(0) scale(0.98); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── PAGE 2 ── */
  #page2 {
    background: linear-gradient(160deg, #fdf6fb 0%, #eef6fd 50%, #fdf0f5 100%);
    flex-direction: column;
    overflow-y: auto;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 20px 60px;
  }
  #page2 .card-wrap {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; gap: 28px;
    width: 100%; max-width: 1000px;
    opacity: 0;
    animation: cardReveal 1.1s cubic-bezier(.22,1,.36,1) 0.1s forwards;
  }
  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(40px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .card-frame {
    width: 100%;
    border-radius: 24px;
    box-shadow:
      0 4px 6px rgba(168,207,224,0.12),
      0 20px 60px rgba(212,143,168,0.18),
      0 0 0 1px rgba(255,255,255,0.8);
    overflow: hidden;
    position: relative;
  }
  .card-frame::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 24px;
    border: 1.5px solid rgba(255,255,255,0.9);
    z-index: 2; pointer-events: none;
  }
  .card-frame img { width: 100%; display: block; }

  .back-btn {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.95rem;
    letter-spacing: 0.1em;
    color: var(--text-light);
    background: none;
    border: 1px solid var(--blue-mid);
    padding: 9px 28px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.22s ease;
  }
  .back-btn:hover { background: var(--blue-soft); color: var(--blue-deep); }

  /* floating clouds on page2 too */
  #page2-deco { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

  /* ── YOUTUBE hidden iframe ── */
  #yt-player {
    position: fixed;
    width: 1px; height: 1px;
    bottom: 0; left: 0;
    opacity: 0; pointer-events: none;
    z-index: -1;
  }

  /* ── MUSIC TOGGLE BUTTON ── */
  #music-btn {
    position: fixed;
    bottom: 24px; right: 24px;
    z-index: 999;
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1.5px solid rgba(240,168,192,0.6);
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(232,160,188,0.25);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    animation: fadeUp 1.2s ease 2s both;
  }
  #music-btn:hover {
    transform: scale(1.12);
    box-shadow: 0 6px 28px rgba(232,160,188,0.4);
  }
  #music-btn.paused { opacity: 0.55; }

  /* spinning vinyl ring when playing */
  #music-btn::before {
    content: '';
    position: absolute; inset: -4px;
    border-radius: 50%;
    border: 2px dashed rgba(240,168,192,0.45);
    animation: spin 6s linear infinite;
  }
  #music-btn.paused::before { animation-play-state: paused; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- floating music toggle -->
<button id="music-btn" title="Toggle music" onclick="toggleMusic()">🎵</button>

<!-- ═══════════ PAGE 1 ═══════════ -->
<div id="page1" class="page">
  <canvas id="sky-canvas"></canvas>

  <!-- petals injected by JS -->

  <div class="content">
    <p class="eyebrow">a little something for you</p>
    <h1 class="hb-text">Happy Birthday</h1>
    <p class="name-text">Gita 🤍</p>
    <div class="divider"></div>
    <button class="btn-love" id="openBtn" onclick="goToCard()">for my love</button>
  </div>
</div>

<!-- ═══════════ AUDIO ═══════════ -->
<script>
// ── Music toggle ──
let musicPlaying = true;
const ytFrame = document.getElementById('yt-player');
const musicBtn = document.getElementById('music-btn');

function toggleMusic() {
  if (musicPlaying) {
    // mute via src swap
    ytFrame.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
    musicBtn.textContent = '🔇';
    musicBtn.classList.add('paused');
  } else {
    ytFrame.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
    musicBtn.textContent = '🎵';
    musicBtn.classList.remove('paused');
  }
  musicPlaying = !musicPlaying;
}

// ── Soft chime sound on button click (Web Audio API) ──
function playChime() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523.25, 659.25, 783.99, 1046.50]; // C5 E5 G5 C6
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = ctx.currentTime + i * 0.18;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.18, t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
      osc.start(t); osc.stop(t + 0.85);
    });
  } catch(e) {}
}

// ── Page transitions ──
function goToCard() {
  playChime();
  const p1 = document.getElementById('page1');
  const p2 = document.getElementById('page2');
  p1.classList.add('hidden');
  setTimeout(() => {
    p2.classList.remove('hidden');
    // re-trigger card animation
    const cw = document.getElementById('cardWrap');
    cw.style.animation = 'none';
    cw.offsetHeight;
    cw.style.animation = '';
  }, 100);
}
function goBack() {
  document.getElementById('page2').classList.add('hidden');
  setTimeout(() => document.getElementById('page1').classList.remove('hidden'), 100);
}

// ── Cloud canvas ──
const canvas = document.getElementById('sky-canvas');
const ctx2d = canvas.getContext('2d');
let clouds = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function makeCloud() {
  return {
    x: Math.random() * canvas.width * 1.4 - canvas.width * 0.2,
    y: Math.random() * canvas.height * 0.7,
    r: 38 + Math.random() * 55,
    speed: 0.15 + Math.random() * 0.25,
    alpha: 0.12 + Math.random() * 0.14
  };
}
for (let i = 0; i < 11; i++) clouds.push(makeCloud());

function drawCloud(c) {
  ctx2d.save();
  ctx2d.globalAlpha = c.alpha;
  const g = ctx2d.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.r * 2.5);
  g.addColorStop(0, '#ffffff');
  g.addColorStop(0.5, '#f0e8f5');
  g.addColorStop(1, 'rgba(240,232,245,0)');
  ctx2d.fillStyle = g;
  ctx2d.beginPath();
  ctx2d.arc(c.x, c.y, c.r * 2.5, 0, Math.PI * 2);
  ctx2d.fill();
  // puff bumps
  [-1.1, -0.5, 0.2, 0.9].forEach((dx, i) => {
    const bx = c.x + dx * c.r, by = c.y - c.r * 0.3;
    const br = c.r * (0.6 + i * 0.08);
    const g2 = ctx2d.createRadialGradient(bx, by, 0, bx, by, br);
    g2.addColorStop(0, 'rgba(255,255,255,0.9)');
    g2.addColorStop(1, 'rgba(255,255,255,0)');
    ctx2d.fillStyle = g2;
    ctx2d.beginPath();
    ctx2d.arc(bx, by, br, 0, Math.PI * 2);
    ctx2d.fill();
  });
  ctx2d.restore();
}

function animateClouds() {
  ctx2d.clearRect(0, 0, canvas.width, canvas.height);
  clouds.forEach(c => {
    c.x += c.speed;
    if (c.x - c.r * 3 > canvas.width) { c.x = -c.r * 3; c.y = Math.random() * canvas.height * 0.7; }
    drawCloud(c);
  });
  requestAnimationFrame(animateClouds);
}
animateClouds();

// ── Petals ──
const petalColors = ['#f9d6e3','#f0a8c0','#d6eaf8','#a8cfe0','#fce4ec','#e3f2fd','#ffd6e7'];
const numPetals = 22;
for (let i = 0; i < numPetals; i++) {
  const p = document.createElement('div');
  p.className = 'petal';
  const color = petalColors[Math.floor(Math.random() * petalColors.length)];
  p.style.cssText = `
    left: ${Math.random() * 100}vw;
    background: ${color};
    width: ${8 + Math.random() * 10}px;
    height: ${10 + Math.random() * 12}px;
    animation-duration: ${6 + Math.random() * 9}s;
    animation-delay: ${Math.random() * 10}s;
    transform: rotate(${Math.random() * 360}deg);
    border-radius: ${50 + Math.random() * 20}% ${50 - Math.random() * 20}% ${50 + Math.random() * 20}% ${50 - Math.random() * 20}%;
    opacity: 0.75;
  `;
  document.getElementById('page1').appendChild(p);
}

// ── Sparkles ──
const sparkleColors = ['#e8a0bc','#a8cfe0','#f9d6e3','#7ab3cc','#f0a8c0'];
for (let i = 0; i < 18; i++) {
  const s = document.createElement('div');
  s.className = 'sparkle';
  const color = sparkleColors[Math.floor(Math.random() * sparkleColors.length)];
  s.style.cssText = `
    left: ${5 + Math.random() * 90}vw;
    top: ${5 + Math.random() * 90}vh;
    width: ${4 + Math.random() * 7}px;
    height: ${4 + Math.random() * 7}px;
    color: ${color};
    animation-duration: ${2 + Math.random() * 3}s;
    animation-delay: ${Math.random() * 4}s;
  `;
  document.getElementById('page1').appendChild(s);
}
</script>
<audio id="bg-music" loop>
  <source src="assets/audio/at-my-worst.mp3" type="audio/mpeg">
</audio>

<script>
  const audio = document.getElementById("bg-music");

  // volume biar halus
  audio.volume = 0.3;

  // autoplay setelah klik pertama
  document.addEventListener("click", () => {
    audio.play();
  }, { once: true });

  function toggleMusic() {
    if (audio.paused) {
      audio.play();
      document.getElementById("music-btn").classList.remove("paused");
    } else {
      audio.pause();
      document.getElementById("music-btn").classList.add("paused");
    }
  }
</script>

<button onclick="toggleMusic()">🎵</button>

<script>
  function toggleMusic() {
    if (audio.paused) {
      audio.play();
    } else {
      audio.pause();
    }
  }
</script>
